<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATMWater 用户APP下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 72px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .version {
            color: #666;
            font-size: 14px;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
        }

        .download-section {
            margin: 32px 0;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .download-btn:active {
            transform: translateY(-1px);
        }

        .file-info {
            margin-top: 12px;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .qrcode-section {
            margin-top: 24px;
            padding: 24px;
            background: #f8f9fa;
            border-radius: 16px;
            text-align: center;
        }

        .qrcode-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            font-weight: 500;
        }

        #qrcode {
            display: inline-block;
            padding: 12px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 20px;
            margin-top: 32px;
            border-radius: 12px;
        }

        .info-title {
            font-weight: 600;
            color: #1976d2;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .info-content {
            color: #555;
            font-size: 14px;
            line-height: 1.8;
        }

        .step {
            margin: 10px 0;
            padding-left: 24px;
            position: relative;
        }

        .step::before {
            content: "→";
            position: absolute;
            left: 0;
            color: #2196f3;
            font-weight: bold;
            font-size: 16px;
        }

        .warning-box {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 20px;
            margin-top: 20px;
            border-radius: 12px;
        }

        .warning-title {
            font-weight: 600;
            color: #f57c00;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 13px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 24px 0;
        }

        .feature-item {
            text-align: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💧</div>
            <h1>ATMWater</h1>
            <div class="subtitle">用户APP</div>
            <div class="version">版本 v0.13 | 正式版</div>
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">💳</div>
                <div class="feature-text">扫码取水</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">💰</div>
                <div class="feature-text">钱包充值</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📍</div>
                <div class="feature-text">查找水站</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div class="feature-text">用水记录</div>
            </div>
        </div>

        <div class="download-section">
            <a href="/download" class="download-btn" download>
                立即下载
            </a>

            <div class="file-info">
                文件大小：约 36 MB | Android 6.0+
            </div>

            <div class="qrcode-section">
                <div class="qrcode-title">手机扫码下载</div>
                <div id="qrcode"></div>
            </div>
        </div>

        <div class="info-box">
            <div class="info-title">安装说明</div>
            <div class="info-content">
                <div class="step">下载 APK 文件到手机</div>
                <div class="step">打开文件管理器，找到下载的 APK</div>
                <div class="step">点击安装（首次需开启"未知来源"权限）</div>
                <div class="step">安装完成后即可使用</div>
            </div>
        </div>

        <div class="warning-box">
            <div class="warning-title">注意事项</div>
            <div class="info-content">
                <div class="step">建议在 WiFi 环境下下载</div>
                <div class="step">如之前安装过测试版，请先卸载</div>
                <div class="step">安装包名：com.atmwater.user</div>
            </div>
        </div>

        <div class="footer">
            <p>ATMWater | <a href="/health">系统状态</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        const downloadUrl = window.location.origin + '/download';

        new QRCode(document.getElementById("qrcode"), {
            text: downloadUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
